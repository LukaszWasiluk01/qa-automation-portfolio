name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Backend
      run: dotnet build src/IssueTracker.API/IssueTracker.API.csproj -c Release

    - name: Run xUnit Integration Tests
      env:
        ASPNETCORE_ENVIRONMENT: Testing
      run: dotnet test src/IssueTracker.Tests/IssueTracker.Tests.csproj -c Release

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Frontend Dependencies
      working-directory: ./e2e
      run: npm install

    - name: Install Playwright Browsers
      working-directory: ./e2e
      run: npx playwright install --with-deps

    - name: Start API Server
      env:
        ASPNETCORE_URLS: http://localhost:5141
        ASPNETCORE_ENVIRONMENT: Testing
      run: dotnet run --project src/IssueTracker.API/IssueTracker.API.csproj &

    - name: Wait for API
      run: sleep 15

    - name: Run Playwright Tests
      working-directory: ./e2e
      run: npx playwright test

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 7