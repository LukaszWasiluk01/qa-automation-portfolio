name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore backend
      run: dotnet restore src/IssueTracker.Tests/IssueTracker.Tests.csproj

    - name: Build backend
      run: dotnet build src/IssueTracker.Tests/IssueTracker.Tests.csproj -c Release --no-restore

    - name: Run xUnit unit & integration tests
      run: dotnet test src/IssueTracker.Tests/IssueTracker.Tests.csproj -c Release --no-build --verbosity normal

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install E2E dependencies
      working-directory: ./e2e
      run: npm ci

    - name: Install Playwright (Chromium)
      working-directory: ./e2e
      run: npx playwright install chromium --with-deps

    - name: Run Playwright tests
      working-directory: ./e2e
      env:
        CI: 'true'
      run: npm test

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 7
