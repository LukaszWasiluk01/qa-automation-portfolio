name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Backend
      run: dotnet build src/IssueTracker.API/IssueTracker.API.csproj -c Release

    - name: Run xUnit Integration Tests
      env:
        ASPNETCORE_ENVIRONMENT: Testing
      run: dotnet test src/IssueTracker.Tests/IssueTracker.Tests.csproj -c Release

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Frontend Dependencies
      working-directory: ./e2e
      run: npm ci

    - name: Install Playwright Browsers (Chromium only for CI)
      working-directory: ./e2e
      run: npx playwright install chromium --with-deps

    - name: Start API Server
      env:
        ASPNETCORE_ENVIRONMENT: Testing
      run: dotnet run --project src/IssueTracker.API/IssueTracker.API.csproj --no-launch-profile --environment Testing --urls "http://localhost:5141" > /tmp/issuetracker-api.log 2>&1 &

    - name: Wait for API to be ready
      run: |
        for i in {1..60}; do
          if curl -sSf http://localhost:5141/swagger/index.html > /dev/null; then
            echo "API is up and running!"
            exit 0
          fi
          echo "Waiting for API to start..."
          sleep 2
        done
        echo "API did not start in time."
        cat /tmp/issuetracker-api.log
        exit 1

    - name: Run Playwright Tests
      working-directory: ./e2e
      env:
        CI: true
      run: npm test

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: e2e/playwright-report/
        retention-days: 7